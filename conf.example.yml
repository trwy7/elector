# Bot token, required
token: "whatever_your_token_is"
# A list of user IDs for VIP members, these people get extra permissions than normal people.
# You should have at least two.
vips:
  - 0000000000
  - 0000000001

channels:
  # Public bot announcements, should be your general channel
  public: 0000000000
  # The main voice channel, when someone joins, an announcement will be sent to the talk channel
  voice: 0000000000
  # A channel category that is used for people to make temporary voice channels
  # All members (including you) should have view permission disabled, the bot will show/hide individual channels
  voice_rooms_category: 0000000000
  # A category for all votes
  # Same as the rooms category, nobody should have view permission
  vote_category: 0000000000
  # Vote results will be sent here as a log, should be private
  logs: 0000000000

roles:
  # There can only be one leader
  leader: 0000000000
  # Vice leader, not needed if features/leader/vice-leader is false
  vice-leader: 0000000000
  # Given to people in the VIP list
  vip_role: 0000000000
  # Gets some VIP permissions, but not all
  plus_role: 0000000000
  # Given to everyone, including people with higher permissions
  guest_role: 0000000000

features:
  leader:
    # Have people vote for leader every saturday
    elections: true
    # Start the vote again when the leader leaves
    elect_on_leave: true
    # Let people overthrow the leader
    # Set the number of votes needed
    overthrow: 6
    # Let the leader pick a vice leader after they are elected
    vice-leader: true
    # Let the leader kick people from the server without a vote
    allow_kick: true
    # Let the leader rename the server
    rename:
      enabled: true
      # The server name will be converted to lowercase before matching
      allowed_regex: ".*"
      # The message to respond with if regex matching fails
      fail_msg: "Your server name is invalid"
    # Let the leader change the server icon
    change_icon: true
  plus:
    vote:
      # Allow people to be voted into the plus role
      enabled: true
      # Required amount of votes
      required_votes: 4
  voice_rooms:
    # Let people make their own voice channels that they manage, they are deleted after everyone leaves
    enabled: true
    # How many rooms can one person have
    max_rooms: 1
    # Joining grace period, in seconds, should be 10+
    join_grace: 15
    # Allow the channel owner to manually change permissions
    # This may allow them to get permissions that may be unwanted
    allow_perm_change: false
  fun:
    timeout:
      # Let people time eachother out
      enabled: true
      # How many times a person can time someone out
      times: 1
      # How often their rate limit gets refreshed, in seconds
      cooldown: 3600
      # How long the timeout lasts, in seconds
      duration: 5
      # How long the timeout lasts if a leader initiated it
      leader_duration: 30
    uwu:
      # Let people uwuify each other
      # This modifies their messages, e.g. Hello -> Hewwo
      enabled: true
      # How many times a person can uwuify someone
      times: 1
      # How often their rate limit gets refreshed, in seconds
      cooldown: 1800
      # How long the uwuify lasts, in seconds
      duration: 30
      # How long the uwuify lasts if a leader initiated it
      leader_duration: 60

permissions:
  # DUE TO DISCORD LIMITATIONS THIS WILL NOT HIDE COMMANDS IN THE UI
  # To hide commands for roles, go to server settings > integrations > [bot name] > then change the permissions for whatever command you want
  # Valid options are:
  # leader - 4
  # vice - 3
  # vip - 2
  # plus - 1
  # all - 0
  # Allow people to become leader, should be 2 at max
  allow_leader: 2
  # Allow people to vote in leader elections
  allow_leader_vote: 1
  # Allow people to vote in kick votes
  allow_kick_vote: 2
  # Allow people to vote in promotion votes (guest to plus)
  allow_promote_vote: 2
  # Allow people to use the timeout command
  allow_timeout: 2
  # Allow people to use the uwuify command
  allow_uwuify: 1
  # Allow people to make voice rooms
  allow_create_room: 0
  # Bypass getting kicked by vote
  # TODO: Make sure people have a minimum of 0 to get kicked
  bypass_votekick: 2
  # Bypass getting kicked by leader
  bypass_kick: 3