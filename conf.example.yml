# Bot token, required
token: "whatever_your_token_is"
# A list of user IDs for VIP members, these people get extra permissions than normal people.
# You should have at least two.
vips:
  - 0000000000
  - 0000000001

channels:
  # Public bot announcements, should be your general channel
  public: 0000000000
  # The main voice channel, when someone joins, an announcement will be sent to the talk channel
  voice: 0000000000
  # A channel category that is used for people to make temporary voice channels
  # All members (including you) should have view permission disabled, the bot will show/hide individual channels
  # All channels in this category will be wiped on bot start
  voice_rooms_category: 0000000000
  # A category for all votes
  # Same as the rooms category, nobody should have view permission
  vote_category: 0000000000
  # Logs about usage are sent here, should be private
  logs: 0000000000

roles:
  # There can only be one leader
  leader: 0000000000
  # Vice leader, not needed if features/leader/vice-leader is false
  vice-leader: 0000000000
  # Given to people in the VIP list
  vip_role: 0000000000
  # Gets some VIP permissions, but not all
  plus_role: 0000000000
  # Given to everyone, including people with higher permissions
  guest_role: 0000000000

features:
  leader:
    # Have people vote for leader every saturday
    elections: true # TODO: implement
    # Start the vote again when the leader leaves
    elect_on_leave: true # TODO: implement
    # Let people overthrow the leader
    # Set the number of votes needed
    overthrow: 6 # TODO: implement
    # When the leader is overthrown, should they be kicked from the server?
    overthrow_kick: false # TODO: implement
    # Let the leader pick a vice leader after they are elected
    vice-leader: true # TODO: implement
    # Force a vice leader to be picked
    # If this is on and the leader does not pick a vice leader, their leader role will be revoked
    force_vice: true # TODO: implement
  kick:
    # Disable kicking members during leader votes
    disable_on_election: true # TODO: implement
    votekick:
      # Let people kick other members by a vote
      enabled: true
      # Required amount of votes
      required_votes: 4
      # How many times a person can start a votekick
      times: 2
      # How often their rate limit gets refreshed, in seconds
      cooldown: 21600
    forcekick:
      # Let people kick others
      # Check permissions for fine control
      enabled: true # TODO: implement
      # How many times a person can forcekick
      times: 3 # TODO: implement
      # How often their rate limit gets refreshed, in seconds
      cooldown: 43200 # TODO: implement
  modify:
    # Let people rename the server
    rename: true
    # The full server name must match this regex (uses re.fullmatch)
    rename_regex: ".*"
    # The message to respond with if regex matching fails
    rename_fail_msg: "Your server name is invalid"
    # Let people change the server icon
    change_icon: true
    # Let people rename permission roles
    rename_roles: false
  plusvote:
    # Allow people to be voted into the plus role
    # Always disabled during leader votes # TODO: implement
    enabled: true
    # Required amount of votes
    required_votes: 5
    # Required amount of time in the server to be eligible, in hours
    # If the bot restarts while the person is in the waiting period, they will be automatically granted eligibility
    required_wait: 48 # TODO: implement
    # How many times a person can start a promotion vote
    times: 2
    # How often their rate limit gets refreshed, in seconds
    cooldown: 86400
  voice_rooms:
    # Let people make their own voice channels that they manage, they are deleted after everyone leaves
    enabled: true
    # How many rooms can one person have
    max_rooms: 1
    # Joining grace period, in seconds, should be 10+
    join_grace: 15
    # Allow the channel owner to manually change permissions
    # This may allow them to get permissions that may be unwanted
    allow_perm_change: false
  announce_main_call:
    # Send an announcement when someone joins the main voice channel, and is the only person in it. This pings @everyone
    on_first_join: true # TODO: implement
    # Send a message when someone joins the main voice channel
    on_join: false # TODO: implement
    # Send an announcement when everyone has left the main voice channel
    on_last_leave: false # TODO: implement
    # Send a message when someone has left the main voice channel
    on_leave: false # TODO: implement
  # The bot automatically saves server mute/deafen status per channel
  # After 5 minutes of inactivity, the bot will reset them to unmuted (Provided the user is not supressed by permissions) and undeafened
  # Change the number below to choose how long this cache lasts (in minutes)
  voice_state_cache_duration: 5
  fun:
    timeout:
      # Let people time eachother out
      enabled: true
      # How many times a person can time someone out
      times: 1
      # How often their rate limit gets refreshed, in seconds
      cooldown: 3600
      # How long the timeout lasts, in seconds
      duration: 5
      # How long the timeout lasts if a leader initiated it
      leader_duration: 30
    uwu:
      # Let people uwuify each other
      # This modifies their messages, e.g. Hello -> Hewwo
      enabled: true
      # How many times a person can uwuify someone
      times: 1
      # How often their rate limit gets refreshed, in seconds
      cooldown: 1800
      # How long the uwuify lasts, in seconds
      duration: 30
      # How long the uwuify lasts if a leader initiated it
      leader_duration: 60
    autoreply: # If you want no autoreply, delete below and replace with []
      - match: "ping" # this is regex
        send: "pong" # what to reply with
        delete: false # if the bot should delete the original

permissions:
  # DUE TO DISCORD LIMITATIONS THIS WILL NOT HIDE COMMANDS IN THE UI
  # To hide commands for roles, go to server settings > integrations > [bot name] > then change the permissions for whatever command you want
  # Valid options are:
  # leader - 4
  # vice - 3
  # vip - 2
  # plus - 1
  # all - 0
  # Allow people to become leader, should be 2 at max
  allow_leader: 2 # TODO: implement
  # Allow people to vote in leader elections
  allow_leader_vote: 1 # TODO: implement
  # Allow people to start a votekick
  allow_kick_start: 2
  # Allow people to vote in kick votes
  allow_kick_vote: 2
  # Bypass getting kicked by vote
  bypass_votekick: 2
  # Allow people to kick other people, no vote required
  allow_forcekick: 3 # TODO: implement
  # Bypass getting forcekicked
  bypass_forcekick: 3 # TODO: implement
  # Allow people to start promotion votes
  allow_promote_start: 3 # TODO: implement
  # Allow people to vote in promotion votes (guest to plus)
  allow_promote_vote: 2 # TODO: implement
  # Allow people to use the timeout command
  allow_timeout: 2
  # Allow people to use the uwuify command
  allow_uwuify: 1
  # Allow people to make voice rooms
  allow_create_room: 0
  # Who can rename the server
  allow_server_rename: 3
  # Who can change the server icon
  allow_icon_change: 4
  # Who can rename permission roles
  allow_perm_rename: 4